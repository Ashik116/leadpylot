services:
  configuration-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: configuration-service
    image: leadpylot/configuration-service:latest
    ports:
      - "4006:4006"
    environment:
      - NODE_ENV=development
      - PORT=4006
      # Connect to SHARED MongoDB from main docker-compose (using host.docker.internal for macOS)
      - MONGODB_URI=mongodb://host.docker.internal:27017/leadpylot
      - JWT_SECRET=${JWT_SECRET}
      # Service URLs (for inter-service communication)
      - AUTH_SERVICE_URL=http://host.docker.internal:4000
      - DOCUMENT_SERVICE_URL=http://host.docker.internal:4001
      - LEAD_SERVICE_URL=http://host.docker.internal:4003
      - SEARCH_SERVICE_URL=http://host.docker.internal:3010
      - CORS_ORIGIN=http://localhost:3001
      - LOG_LEVEL=info
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4006/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s