
services:
  user-auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-auth-service
    image: leadpylot/user-auth-service:latest
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - MONGODB_URI=mongodb://host.docker.internal:27017/leadpylot
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_DURATION_HOURS=24
      - LOG_LEVEL=info
      - SEARCH_SERVICE_URL=http://localhost:3010
      - REDIS_URL=redis://host.docker.internal:6379
      # Authentik SSO Configuration
      - AUTHENTIK_BASE_URL=${AUTHENTIK_BASE_URL:-https://auth.pylot.pro}
      - AUTHENTIK_CLIENT_ID=${AUTHENTIK_CLIENT_ID}
      - AUTHENTIK_CLIENT_SECRET=${AUTHENTIK_CLIENT_SECRET}
      - AUTHENTIK_REDIRECT_URI=${AUTHENTIK_REDIRECT_URI:-http://localhost:4000/auth/authentik/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
      - NOTIFICATION_SERVICE_URL=http://host.docker.internal:4004
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      - /app/node_modules
    # Using host Redis (redis-stack already running)
    # depends_on:
    #   - redis-stack
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
                
  redis-stack:
    image: redis/redis-stack:latest
    container_name: redis-stack
    ports:
      - "6379:6379"
      - "8003:8001"  
    volumes:
      - redis-stack:/var/lib/redis-stack
    environment:
      - REDIS_ARGS=--save 900 1
    restart: unless-stopped

volumes:
  redis-stack:
