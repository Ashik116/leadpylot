services:
  search-service-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: search-service-api
    image: leadpylot/search-service-api:latest
    ports:
      - "3010:3010"
    # Load environment variables from .env file (create .env file with JWT_SECRET)
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3010
      - MONGODB_URI=mongodb://host.docker.internal:27017/leadpylot
      # JWT_SECRET will be loaded from .env file via env_file directive above
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=info
      - CORS_ORIGIN=http://localhost:3001
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      # Mount models from all microservices (standalone APIs)
      - /Users/syedmomininislamtamim/Desktop/CRM/lead-offer-service-api/src/models:/app/backend/microservices/lead-offers-service/src/models
      - /Users/syedmomininislamtamim/Desktop/CRM/configuration-service-api/src/models:/app/backend/microservices/configuration-service/src/models
      - /Users/syedmomininislamtamim/Desktop/CRM/email-service-api/src/models:/app/backend/microservices/email-service/src/models
      - /Users/syedmomininislamtamim/Desktop/CRM/user-auth-service-api/src/models:/app/backend/microservices/user-auth-service/src/models
      - /Users/syedmomininislamtamim/Desktop/CRM/pdf-service-api/src/models:/app/backend/microservices/pdf-service/src/models
      - /Users/syedmomininislamtamim/Desktop/CRM/reporting-service-api/src/models:/app/backend/microservices/reportings-service/src/models
      - /Users/syedmomininislamtamim/Desktop/CRM/document-service-api/src/models:/app/backend/microservices/document-service/src/models
      - /Users/syedmomininislamtamim/Desktop/CRM/notification-service-api/src/models:/app/backend/microservices/notification-service/src/models
      - /app/node_modules
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3010/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

